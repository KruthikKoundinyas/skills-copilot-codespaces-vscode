name: Initialize Project
on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Prepare Workspace
        run: |
          mkdir -p src
          echo "// Start typing 'function calculateDaysBetweenDates' to see Copilot work" > src/member.js
          echo "Environment Ready. Open src/member.js in Codespaces."
